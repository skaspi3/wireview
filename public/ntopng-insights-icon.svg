    <path d="M22 40 31 48"/>
    <path d="M33 18 28 28"/>
    <path d="M36 16 49 16"/>
    <path d="M35 19 46 29"/>
  </g>

  <g fill="#f8fafc">
    <circle cx="13.5" cy="34" r="5.5"/>
    <circle cx="26.5" cy="34" r="5.5"/>
    <circle cx="31.5" cy="48.5" r="5.5"/>
    <circle cx="35" cy="16" r="5.5"/>
    <circle cx="50" cy="16" r="5.5"/>
    <circle cx="48" cy="30" r="5.5"/>
  </g>

  <g transform="translate(25 25)">
    <circle cx="13" cy="13" r="12.5" fill="#f97316"/>
    <circle cx="13" cy="13" r="8.25" fill="none" stroke="#ffffff" stroke-width="4"/>
    <rect x="20.25" y="20" width="11.5" height="5.25" rx="2.6" transform="rotate(45 20.25 20)" fill="#f97316"/>
    <circle cx="13" cy="13" r="2.7" fill="#374151"/>
  </g>
</svg>
